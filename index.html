<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莫蘭迪八色海報生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 莫蘭迪 8 色定義 */
    --m-red-bg: #E8D7D7; --m-red-acc: #C1A6A6; --m-red-tx: #735D5D; --m-red-sub: #9D8A8A;
    --m-orange-bg: #E8DED7; --m-orange-acc: #C1B2A6; --m-orange-tx: #73675D; --m-orange-sub: #9D918A;
    --m-yellow-bg: #E8E5D7; --m-yellow-acc: #C1BDA6; --m-yellow-tx: #736F5D; --m-yellow-sub: #9D998A;
    --m-green-bg: #DDE8D7; --m-green-acc: #B2C1A6; --m-green-tx: #67735D; --m-green-sub: #919D8A;
    --m-blue-bg: #D7E1E8; --m-blue-acc: #A6B7C1; --m-blue-tx: #5D6C73; --m-blue-sub: #8A989D;
    --m-purple-bg: #DFD7E8; --m-purple-acc: #B3A6C1; --m-purple-tx: #685D73; --m-purple-sub: #928A9D;
    --m-pink-bg: #E8D7E2; --m-pink-acc: #C1A6B8; --m-pink-tx: #735D6C; --m-pink-sub: #9D8A95;
    --m-grey-bg: #E2E2E2; --m-grey-acc: #BDBDBD; --m-grey-tx: #616161; --m-grey-sub: #8F8F8F;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #F4F2F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; color: #6E6864; margin-bottom: 24px; }

  .app {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 28px;
    width: 100%;
    max-width: 1000px;
  }

  .input-panel {
    background: #FCFAF9;
    border-radius: 20px;
    padding: 24px;
    border: 1.5px solid rgba(139,99,64,0.12);
    box-shadow: 0 4px 24px rgba(80,70,60,0.06);
  }

  .field-group { margin-bottom: 20px; }
  .field-label { font-size: 0.85rem; font-weight: 500; color: #59524E; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .field-label .num { width: 20px; height: 20px; background: #AF9D92; color: #fff; border-radius: 50%; font-size: 0.72rem; display: flex; align-items: center; justify-content: center; }

  textarea, input[type=text] {
    width: 100%;
    background: #fff;
    border: 1.5px solid rgba(139,99,64,0.18);
    border-radius: 10px;
    padding: 10px;
    font-size: 0.9rem;
    outline: none;
  }

  .themes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .theme-option { cursor: pointer; }
  .theme-option input { display: none; }
  .theme-swatch { border-radius: 8px; overflow: hidden; border: 2px solid transparent; transition: 0.2s; aspect-ratio: 1; }
  .theme-option input:checked + .theme-swatch { border-color: #AF9D92; transform: scale(1.05); }
  .swatch-inner { width: 100%; height: 100%; }

  .btn-download {
    width: 100%;
    padding: 13px;
    background: #AF9D92;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
  }

  .preview-panel { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #poster-wrap { width: 100%; max-width: 450px; aspect-ratio: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
  #poster { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }

  .poster-quote { font-family: 'Noto Serif TC', serif; font-size: 2rem; font-weight: 700; line-height: 1.6; text-align: center; z-index: 1; margin-bottom: 24px; white-space: pre-wrap; }
  .poster-divider { width: 40px; height: 2px; margin-bottom: 16px; z-index: 1; }
  .poster-author { font-family: 'Noto Serif TC', serif; font-size: 1rem; z-index: 1; }

  .poster-deco { position: absolute; inset: 0; }
  .deco-c1 { position: absolute; width: 50%; height: 50%; border-radius: 50%; top: -10%; right: -10%; opacity: 0.2; }
  .deco-c2 { position: absolute; width: 40%; height: 40%; border-radius: 50%; bottom: -10%; left: -10%; opacity: 0.15; }

  /* 色系切換邏輯 */
  .theme-red { --bg: var(--m-red-bg); --acc: var(--m-red-acc); --tx: var(--m-red-tx); --sub: var(--m-red-sub); }
  .theme-orange { --bg: var(--m-orange-bg); --acc: var(--m-orange-acc); --tx: var(--m-orange-tx); --sub: var(--m-orange-sub); }
  .theme-yellow { --bg: var(--m-yellow-bg); --acc: var(--m-yellow-acc); --tx: var(--m-yellow-tx); --sub: var(--m-yellow-sub); }
  .theme-green { --bg: var(--m-green-bg); --acc: var(--m-green-acc); --tx: var(--m-green-tx); --sub: var(--m-green-sub); }
  .theme-blue { --bg: var(--m-blue-bg); --acc: var(--m-blue-acc); --tx: var(--m-blue-tx); --sub: var(--m-blue-sub); }
  .theme-purple { --bg: var(--m-purple-bg); --acc: var(--m-purple-acc); --tx: var(--m-purple-tx); --sub: var(--m-purple-sub); }
  .theme-pink { --bg: var(--m-pink-bg); --acc: var(--m-pink-acc); --tx: var(--m-pink-tx); --sub: var(--m-pink-sub); }
  .theme-grey { --bg: var(--m-grey-bg); --acc: var(--m-grey-acc); --tx: var(--m-grey-tx); --sub: var(--m-grey-sub); }

  #poster { background: var(--bg); }
  .poster-quote { color: var(--tx); }
  .poster-author { color: var(--sub); }
  .poster-divider, .deco-c1, .deco-c2 { background: var(--acc); }

  @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>🎨 莫蘭迪金句海報</h1>

<div class="app">
  <div class="input-panel">
    <div class="field-group">
      <div class="field-label"><span class="num">1</span> 金句內容</div>
      <textarea id="quote-input" rows="3">想了，就去做</textarea>
    </div>
    <div class="field-group">
      <div class="field-label"><span class="num">2</span> 作者</div>
      <input type="text" id="author-input" value="— Cyan Lee">
    </div>
    <div class="field-group">
      <div class="field-label"><span class="num">3</span> 選擇配色 (紅橙黃綠藍紫粉灰)</div>
      <div class="themes">
        <label class="theme-option"><input type="radio" name="theme" value="red" checked><div class="theme-swatch"><div class="swatch-inner" style="background:#E8D7D7" title="紅"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="orange"><div class="theme-swatch"><div class="swatch-inner" style="background:#E8DED7" title="橙"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="yellow"><div class="theme-swatch"><div class="swatch-inner" style="background:#E8E5D7" title="黃"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="green"><div class="theme-swatch"><div class="swatch-inner" style="background:#DDE8D7" title="綠"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="blue"><div class="theme-swatch"><div class="swatch-inner" style="background:#D7E1E8" title="藍"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="purple"><div class="theme-swatch"><div class="swatch-inner" style="background:#DFD7E8" title="紫"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="pink"><div class="theme-swatch"><div class="swatch-inner" style="background:#E8D7E2" title="粉"></div></div></label>
        <label class="theme-option"><input type="radio" name="theme" value="grey"><div class="theme-swatch"><div class="swatch-inner" style="background:#E2E2E2" title="灰"></div></div></label>
      </div>
    </div>
    <button class="btn-download" onclick="downloadPoster()">下載海報 (PNG)</button>
  </div>

  <div class="preview-panel">
    <div id="poster-wrap" class="theme-red">
      <div id="poster">
        <div class="poster-deco"><div class="deco-c1"></div><div class="deco-c2"></div></div>
        <div class="poster-quote" id="poster-quote">想了，就去做</div>
        <div class="poster-divider"></div>
        <div class="poster-author" id="poster-author">— Cyan Lee</div>
      </div>
    </div>
  </div>
</div>

<script>
  const quoteInput = document.getElementById('quote-input');
  const authorInput = document.getElementById('author-input');
  const posterQuote = document.getElementById('poster-quote');
  const posterAuthor = document.getElementById('poster-author');
  const posterWrap = document.getElementById('poster-wrap');

  quoteInput.addEventListener('input', () => posterQuote.textContent = quoteInput.value || '輸入內容…');
  authorInput.addEventListener('input', () => posterAuthor.textContent = authorInput.value);
  document.querySelectorAll('input[name=theme]').forEach(radio => {
    radio.addEventListener('change', () => posterWrap.className = `theme-${radio.value}`);
  });

  async function downloadPoster() {
    const canvas = await html2canvas(document.getElementById('poster'), { scale: 2 });
    const link = document.createElement('a');
    link.download = 'CyanLee_Poster.png';
    link.href = canvas.toDataURL();
    link.click();
  }
</script>
</body>
</html>
